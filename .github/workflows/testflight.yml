name: TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Select Latest Available Xcode
        run: |
          if [ -d "/Applications/Xcode_26.5.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            LATEST_XCODE=$(ls -d /Applications/Xcode*.app | tail -n 1)
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Volta (Enforce Node 22 globally)
        uses: volta-cli/action@v4
        with:
          node-version: '22'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Force Custom Fresh Install
        run: |
          npm config set cache /Users/runner/.npm-custom-cache --global
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install ajv@^8.0.0 ajv-keywords@^5.0.0 --save-dev --legacy-peer-deps

      - name: Build Web Assets
        env:
          CI: false
        run: |
          npm run build --if-present

      - name: Regenerate Capacitor iOS Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      # 🔍 DEDEKTİF ADIMI: Podfile tam olarak nerede, listeliyoruz
      - name: Find Podfile Location
        run: |
          echo "=== IOS KLASÖRÜNÜN İÇİ ==="
          ls -la ios || true
          echo ""
          echo "=== TÜM DIZINLERDE PODFILE ARAMASI ==="
          find . -name "Podfile"
