name: Deploy to TestFlight

on:
  push:
    branches:
      - main # Veya hangi branch'i kullanıyorsan (örn: master, develop)

jobs:
  deploy:
    runs-on: macos-14 # En kararlı Xcode sürümleri için macos-14 (veya 15) idealdir

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Doğru Node.js Versiyonunun Kurulması (Node 22)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 2. Bağımlılıkların ve Web Paketinin Kurulması
      - name: Install Dependencies & Build Web Project
        run: |
          npm ci
          npm run build

      # 3. CocoaPods Kurulumu ve Ruby Ortamı
      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Güncel ve kararlı Ruby sürümü
          bundler-cache: true

      # 4. Capacitor iOS Senkronizasyonu
      - name: Capacitor Sync iOS
        run: |
          npx cap sync ios

      # 5. Pod'ların Tamamen Temiz ve Doğru Hedefle Kurulması
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod deintegrate
          pod install
          cd ../..

      # 6. Fastlane ile TestFlight'a Gönderim
      # CI=true ve FASTLANE_NON_INTERACTIVE=true prompt kilitlenmelerini engeller
      - name: Run Fastlane Deploy
        env:
          CI: true
          FASTLANE_NON_INTERACTIVE: true
          APPLE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPLE_CONNECT_API_KEY_KEY_ID }}
          APPLE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPLE_CONNECT_API_KEY_ISSUER_ID }}
          APPLE_CONNECT_API_KEY_KEY: ${{ secrets.APPLE_CONNECT_API_KEY_KEY }}
        run: |
          cd ios/App
          bundle exec fastlane ios beta # Fastfile içindeki lane adın neyse (örn: beta, deploy) onu yaz
