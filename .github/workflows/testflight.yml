name: TestFlight Final

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    permissions:
      contents: write
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable IPv6 (SPM hang fix)
        run: |
          networksetup -listallnetworkservices | tail -n +2 | while read -r service; do
            sudo networksetup -setv6off "$service" || true
          done

      - name: Configure Git for SPM
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup Volta (Enforce Node 22 globally)
        uses: volta-cli/action@v4
        with:
          node-version: '22'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Force Custom Fresh Install
        timeout-minutes: 10
        run: |
          npm config set cache /Users/runner/.npm-custom-cache --global
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install ajv@^8.0.0 ajv-keywords@^5.0.0 --save-dev --legacy-peer-deps

      - name: Build Web Assets
        timeout-minutes: 10
        env:
          CI: false
        run: npm run build --if-present

      - name: Capacitor Copy
        timeout-minutes: 3
        run: npx cap copy ios

      - name: Capacitor Update (with retry)
        timeout-minutes: 8
        run: |
          run_with_timeout() {
            local secs=$1; shift
            "$@" &
            local pid=$!
            ( sleep "$secs" && kill -9 "$pid" 2>/dev/null ) &
            local watcher=$!
            wait "$pid" 2>/dev/null
            local status=$?
            kill -9 "$watcher" 2>/dev/null
            return $status
          }
          success=false
          for i in 1 2 3; do
            if run_with_timeout 180 npx cap update ios; then
              success=true
              break
            fi
            echo "Attempt $i failed or timed out, retrying..."
            sleep 10
          done
          if [ "$success" = false ]; then
            echo "Capacitor update failed after 3 attempts"
            exit 1
          fi

      - name: Install CocoaPods
        timeout-minutes: 10
        run: |
          cd ios/App
          if [ ! -f "Podfile" ]; then
            echo "Podfile yok, oluşturuluyor..."
            cat > Podfile << 'EOF'
          platform :ios, '17.0'
          use_frameworks!

          target 'App' do
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '17.0'
              end
            end
          end
          EOF
          fi
          pod install --repo-update
          cd ../..

      - name: Install Ruby Gems (Fastlane)
        run: bundle install

      - name: Share Xcode Scheme
        run: |
          cd ios/App
          bundle exec ruby -rxcodeproj -e '
            project_path = "App.xcodeproj"
            project = Xcodeproj::Project.open(project_path)
            project.targets.each do |target|
              next unless target.name == "App"
              scheme = Xcodeproj::XCScheme.new
              scheme.add_build_target(target)
              scheme.set_launch_target(target)
              scheme.save_as(project_path, "App", true)
            end
            puts "Scheme shared successfully"
          '

      - name: Pre-resolve SPM Dependencies
        timeout-minutes: 15
        run: |
          run_with_timeout() {
            local secs=$1; shift
            "$@" &
            local pid=$!
            ( sleep "$secs" && kill -9 "$pid" 2>/dev/null ) &
            local watcher=$!
            wait "$pid" 2>/dev/null
            local status=$?
            kill -9 "$watcher" 2>/dev/null
            return $status
          }
          cd ios/App
          success=false
          for i in 1 2 3; do
            if run_with_timeout 240 xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App; then
              success=true
              break
            fi
            echo "Attempt $i failed or timed out, retrying..."
            sleep 10
          done
          if [ "$success" = false ]; then
            echo "SPM resolution failed after 3 attempts"
            exit 1
          fi

      - name: Build and upload to TestFlight
        timeout-minutes: 25
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUNDLE_ID: com.borctakip.mobile.app
          MATCH_GIT_URL: "https://x-access-token:${{ secrets.MATCH_GIT_TOKEN }}@github.com/mlhgncn/ios-certificates.git"
        run: |
          cd ios/App
          bundle exec fastlane ios release
