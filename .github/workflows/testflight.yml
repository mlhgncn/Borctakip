name: TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Select Latest Available Xcode
        run: |
          if [ -d "/Applications/Xcode_26.5.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          else
            LATEST_XCODE=$(ls -d /Applications/Xcode*.app | tail -n 1)
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Volta (Enforce Node 22 globally)
        uses: volta-cli/action@v4
        with:
          node-version: '22'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Force Custom Fresh Install
        run: |
          npm config set cache /Users/runner/.npm-custom-cache --global
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install ajv@^8.0.0 ajv-keywords@^5.0.0 --save-dev --legacy-peer-deps

      - name: Build Web Assets
        env:
          CI: false
        run: |
          npm run build --if-present

      - name: Capacitor Sync
        run: npx cap sync ios

      # ✨ KESİN ÇÖZÜM: Sunucuda Podfile yoksa elinle zorla oluşturup içeriğini dolduruyoruz!
      - name: Install CocoaPods
        run: |
          cd ios/App
          if [ ! -f "Podfile" ]; then
            echo "Podfile yok, düzgün şablonla oluşturuluyor..."
            cat > Podfile << 'EOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '17.0'
          use_frameworks!

          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end

          target 'App' do
            capacitor_pods
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '17.0'
              end
            end
          end
          EOF
          fi

          pod install --repo-update
          cd ../..

      - name: Force Xcode Project Deployment Target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' ios/App/App.xcodeproj/project.pbxproj || \
          sed -i 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Install Ruby Gems (Fastlane)
        run: bundle install

      - name: Configure Git for SPM
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUNDLE_ID: com.borctakip.mobile.app
          MATCH_GIT_URL: "https://x-access-token:${{ secrets.MATCH_GIT_TOKEN }}@github.com/mlhgncn/ios-certificates.git"
        run: |
          cd ios/App
          bundle exec fastlane ios release
