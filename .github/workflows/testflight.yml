name: TestFlight Final

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    permissions:
      contents: write
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable IPv6 (SPM hang fix)
        run: |
          networksetup -listallnetworkservices | tail -n +2 | while read -r service; do
            sudo networksetup -setv6off "$service" || true
          done

      - name: Configure Git for SPM
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup Volta (Enforce Node 22 globally)
        uses: volta-cli/action@v4
        with:
          node-version: '22'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Force Custom Fresh Install
        timeout-minutes: 10
        run: |
          npm config set cache /Users/runner/.npm-custom-cache --global
          rm -rf node_modules package-lock.json
          np
